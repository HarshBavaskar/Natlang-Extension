name: Bug report
description: Create a report to help us improve NatLang
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce?
      description: Steps to recreate the issue.
      placeholder: 1. Open .nl file...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NatLang Version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: AI Provider
      placeholder: e.g. Ollama, Gemini, Claude
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant logs from the VS Code Developer Tools console.
      render: shell
