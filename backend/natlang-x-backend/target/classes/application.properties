spring.application.name=natlang-x-backend

natlangx.db.url=${NATLANGX_DB_URL:jdbc:mysql://localhost:3306/natlangx?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
natlangx.db.username=${NATLANGX_DB_USERNAME:root}
natlangx.db.password=${NATLANGX_DB_PASSWORD:}
natlangx.db.driver=${NATLANGX_DB_DRIVER:com.mysql.cj.jdbc.Driver}

natlangx.ollama.baseUrl=${NATLANGX_OLLAMA_BASE_URL:http://127.0.0.1:11434}
natlangx.ollama.model=${NATLANGX_OLLAMA_MODEL:codellama:latest}

natlangx.openai.baseUrl=${NATLANGX_OPENAI_BASE_URL:https://api.openai.com}
natlangx.openai.model=${NATLANGX_OPENAI_MODEL:gpt-4o-mini}
natlangx.openai.apiKey=${NATLANGX_OPENAI_API_KEY:}

natlangx.gemini.baseUrl=${NATLANGX_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
natlangx.gemini.model=${NATLANGX_GEMINI_MODEL:gemini-1.5-flash}
natlangx.gemini.apiKey=${NATLANGX_GEMINI_API_KEY:}

natlangx.anthropic.baseUrl=${NATLANGX_ANTHROPIC_BASE_URL:https://api.anthropic.com}
natlangx.anthropic.model=${NATLANGX_ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
natlangx.anthropic.apiKey=${NATLANGX_ANTHROPIC_API_KEY:}

server.port=8080
